version: '3.8'

name: PlaybackSync

services:
  playbacksync-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: PlaybackSync-Dev
    environment:
      - PORT=8080
      - LOG_LEVEL=info
      - NODE_ENV=development
      - ANON_LOGGING=true
      - ROOM_TTL_SECONDS=86400
      - DRIFT_CHECK_INTERVAL_MS=5000
      - DRIFT_THRESHOLD_MS=500
      - COOLDOWN_WINDOW_MS=3000
      - CLIENT_TOMBSTONE_MS=30000
      - RATE_LIMIT_EVENTS_PER_SEC=10
      - JOIN_TIMEOUT_MS=5000
      - SHARE_HOSTNAME=${SHARE_HOSTNAME:-}
      - SYNC_HOSTNAME=${SYNC_HOSTNAME:-}
      - SERVER_SECRET=${SERVER_SECRET:-}
    ports:
      - '8080:8080'
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./nodemon.json:/app/nodemon.json
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/healthz']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
