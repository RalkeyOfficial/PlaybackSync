  <text x="240" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="600" letter-spacing="-1.5" fill="#0F172A">Playback<tspan fill="#2563EB" font-weight="500">Sync</tspan></text>
</svg>
