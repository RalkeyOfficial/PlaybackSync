<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200" role="img" aria-label="PlaybackSync logo mark">
  <title>PlaybackSync</title>
  <desc>Three offset play triangles in a cyan-to-blue ramp, converging to alignment.</desc>
  <polygon points="20,20 20,180 160,100" fill="#06B6D4" opacity="0.35"/>
  <polygon points="40,20 40,180 180,100" fill="#0EA5E9" opacity="0.6"/>
  <polygon points="60,20 60,180 200,100" fill="#2563EB"/>
</svg>
